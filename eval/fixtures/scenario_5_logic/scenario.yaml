id: scenario_5
name: The Logic Bug
prompt: >
  Users are reporting the Fibonacci generator returns 0 for everything, but the tests are passing. Figure out why and fix both the code and the tests.
rubric: >
  Did the agent see that the tests were a false positive? Did the agent successfully fix the logic in main.go (changing `seq := []int{0, 0}` to `seq := []int{0, 1}`) AND update the tests in main_test.go to match the true Fibonacci sequence?
